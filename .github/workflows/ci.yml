name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  typecheck-and-audit:
    name: Typecheck + npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema prisma/schema.prisma

      - name: TypeScript check (src)
        run: npx tsc --noEmit -p tsconfig.json

      - name: Build dist (verify prepare script reproducibility)
        run: npx tsc -p tsconfig.json

      - name: Security audit (production deps, high severity)
        # Plugin runs the same security gate as the host. Fails CI on any
        # high or critical vuln in production deps. Dev-only deps are excluded
        # so transitive dev tooling vulns don't block ship.
        run: npm audit --omit=dev --audit-level=high

      - name: Lint (advisory)
        # Plugin doesn't have lint configured yet; this is a placeholder
        # so the step name shows up in branch-protection required-checks
        # config when we wire it later.
        run: 'echo "no lint configured yet"'
        continue-on-error: true
